name: Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Release EXE
    runs-on: windows-2022

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Cache CMake deps (JUCE + Assimp sources) ─────────
      - name: Cache CMake build deps
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            cmake-deps-${{ runner.os }}-

      # ── 3. Configure ────────────────────────────────────────
      - name: CMake Configure
        shell: cmd
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CONFIGURATION_TYPES=Release

      # ── 4. Build ─────────────────────────────────────────────
      - name: CMake Build
        shell: cmd
        run: |
          cmake --build build --config Release --parallel %NUMBER_OF_PROCESSORS%

      # ── 5. Find the EXE ─────────────────────────────────────
      - name: Locate EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "OsciStudio3D.exe" build | Select-Object -First 1
          Write-Host "Found: $($exe.FullName)"
          echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV

      # ── 6. Upload artifact ───────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: OsciStudio3D-Windows-x64
          path: ${{ env.EXE_PATH }}
          retention-days: 30
          if-no-files-found: error

      # ── 7. Upload PDB for debugging (optional) ───────────────
      - name: Upload PDB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OsciStudio3D-PDB
          path: build/**/*.pdb
          retention-days: 7
          if-no-files-found: ignore
